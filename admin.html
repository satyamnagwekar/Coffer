<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>MyAurum · Admin</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --brand: #8B6914;
      --brand-light: #B8921A;
      --bg: #FAF7F2;
      --card: #FFFFFF;
      --border: rgba(139,105,20,0.15);
      --text: #2C2410;
      --muted: #888070;
      --green: #2E7D5A;
      --red: #C0392B;
      --gold: #B8860B;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-family: Georgia, serif; font-size: 20px; font-weight: 300; letter-spacing: .18em; color: var(--brand); }
    .logo span { font-size: 11px; font-family: monospace; color: var(--muted); letter-spacing: .1em; margin-left: 10px; }
    .refresh-btn {
      background: var(--brand); color: #FDF8F0; border: none; border-radius: 6px;
      padding: 8px 16px; font-size: 12px; letter-spacing: .08em; cursor: pointer;
      font-family: monospace; transition: opacity .2s;
    }
    .refresh-btn:hover { opacity: .85; }

    main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    .updated { font-size: 11px; color: var(--muted); margin-bottom: 24px; font-family: monospace; }

    /* KPI row */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .kpi {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .kpi-label { font-size: 11px; font-family: monospace; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
    .kpi-value { font-family: Georgia, serif; font-size: 38px; font-weight: 300; color: var(--brand); line-height: 1; }
    .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .kpi-sub.up { color: var(--green); }
    .kpi-sub.down { color: var(--red); }

    /* Charts row */
    .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 32px; }
    @media(max-width:700px) { .charts-grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    .card-title { font-size: 12px; font-family: monospace; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 18px; }

    /* Holdings table */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }
    @media(max-width:600px) { .two-col { grid-template-columns: 1fr; } }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; font-family: monospace; font-size: 10px; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    td { padding: 10px 0; border-bottom: 1px solid var(--border); color: var(--text); }
    tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 20px;
      font-size: 10px; font-family: monospace; letter-spacing: .06em; font-weight: 500;
    }
    .badge-gold { background: rgba(184,134,11,.12); color: var(--gold); }
    .badge-silver { background: rgba(100,100,120,.1); color: #555; }
    .badge-jewellery { background: rgba(180,60,120,.1); color: #b43c78; }
    .badge-coin_bar { background: rgba(184,134,11,.1); color: var(--gold); }
    .badge-raw { background: rgba(60,120,60,.1); color: #3a7a3a; }
    .badge-email { background: rgba(60,100,200,.1); color: #3c64c8; }
    .badge-google { background: rgba(200,60,60,.1); color: #c83c3c; }

    .loading { text-align: center; padding: 60px; color: var(--muted); font-family: monospace; font-size: 13px; }
    .error { text-align: center; padding: 40px; color: var(--red); font-family: monospace; font-size: 13px; }

    canvas { max-height: 220px; }
  </style>
</head>
<body>

<header>
  <div>
    <span class="logo">MYAURUM <span>ADMIN</span></span>
  </div>
  <button class="refresh-btn" onclick="loadStats()">↻ Refresh</button>
    <button class="refresh-btn" style="background:#888;margin-left:8px" onclick="logout()">Sign Out</button>
</header>

<main>
  <div class="updated" id="updatedAt">Loading…</div>
  <div id="content"><div class="loading">Fetching data…</div></div>
</main>

<script>
// bfcache guard
window.addEventListener('pageshow', function(e) {
  if (e.persisted) { location.replace(location.pathname); }
});

function logout() {
  window.location.replace('/dash-4f8a2e91c3b7/logout');
}

async function loadStats() {
  const content = document.getElementById('content');
  const updatedAt = document.getElementById('updatedAt');
  try {
    // Cookie is sent automatically by browser
    const res = await fetch(`/api/dash-4f8a2e91c3b7/stats`, { credentials: 'same-origin' });
    const text = await res.text();
    if (!res.ok) throw new Error(`Stats API ${res.status}: ${text.slice(0,200)}`);
    let d;
    try { d = JSON.parse(text); } catch(e) { throw new Error(`Bad JSON: ${text.slice(0,200)}`); }
    updatedAt.textContent = 'Last updated: ' + new Date().toLocaleString('en-IN', {timeZone:'Asia/Kolkata'}) + ' IST';
    render(d);
  } catch(e) {
    content.innerHTML = `<div class="error">Error: ${e.message}</div>`;
  }
}

function render(d) {
  const weekChange = d.lastWeek > 0
    ? ((d.thisWeek - d.lastWeek) / d.lastWeek * 100).toFixed(0)
    : d.thisWeek > 0 ? '+100' : '0';
  const weekDir = weekChange >= 0 ? 'up' : 'down';

  const verifiedCount = (d.verified.find(v => v.email_verified === true || v.email_verified === 't')?.count) || 0;
  const unverifiedCount = (d.verified.find(v => v.email_verified === false || v.email_verified === 'f')?.count) || 0;
  const activePct = d.totalUsers > 0 ? Math.round(d.activeWeek / d.totalUsers * 100) : 0;
  const dropPct = d.totalUsers > 0 ? Math.round(d.dropoff / d.totalUsers * 100) : 0;
  const activationRate = d.activationRate || 0;
  const activationColor = activationRate >= 50 ? '#1a7a4a' : activationRate >= 25 ? '#b87800' : '#b03030';

  // Auth methods
  const emailCount = d.authMethods.find(m => m.method === 'email')?.count || 0;
  const googleCount = d.authMethods.find(m => m.method === 'google')?.count || 0;

  // Holdings
  const goldHoldings = d.holdingsByMetal.find(m => m.metal === 'gold') || {};
  const silverHoldings = d.holdingsByMetal.find(m => m.metal === 'silver') || {};

  document.getElementById('content').innerHTML = `

    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi" style="border:1px solid rgba(139,105,20,.2);background:#fffdf7;grid-column:span 2">
        <div class="kpi-label">Activation — Users with ≥1 Holding</div>
        <div style="display:flex;align-items:flex-end;gap:12px;margin:6px 0 4px">
          <div class="kpi-value" style="color:${activationColor}">${activationRate}%</div>
          <div style="font-size:13px;color:#888;margin-bottom:4px">${d.activatedUsers} activated · ${d.notActivatedUsers} registered only</div>
        </div>
        <div style="height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-top:4px">
          <div style="height:100%;width:${activationRate}%;background:${activationColor};border-radius:3px;transition:width .4s"></div>
        </div>
        <div style="font-size:11px;color:#aaa;margin-top:6px">of ${d.totalUsers} total registered users · ${d.totalUsers > 0 ? Math.round(d.activatedUsers / d.totalUsers * 100) : 0}% have added at least one holding</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Total Registered</div>
        <div class="kpi-value">${d.totalUsers}</div>
        <div class="kpi-sub ${weekDir}">${weekChange >= 0 ? '+' : ''}${weekChange}% vs last week</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">This Week</div>
        <div class="kpi-value">${d.thisWeek}</div>
        <div class="kpi-sub">new signups (7 days)</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Active (7d)</div>
        <div class="kpi-value">${d.activeWeek}</div>
        <div class="kpi-sub">${activePct}% of total</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Active (30d)</div>
        <div class="kpi-value">${d.activeMonth}</div>
        <div class="kpi-sub">seen in last month</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Drop-off</div>
        <div class="kpi-value">${d.dropoff}</div>
        <div class="kpi-sub ${dropPct > 50 ? 'down' : ''}">${dropPct}% never returned</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">With Alerts</div>
        <div class="kpi-value">${d.withAlerts}</div>
        <div class="kpi-sub">set price alerts</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Avg Holdings</div>
        <div class="kpi-value">${d.avgItemsPerUser || '—'}</div>
        <div class="kpi-sub">items per active user</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Verified</div>
        <div class="kpi-value">${verifiedCount}</div>
        <div class="kpi-sub">${unverifiedCount} unverified</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
      <div class="card">
        <div class="card-title">Signups — Last 30 Days</div>
        <canvas id="signupChart"></canvas>
      </div>
      <div class="card">
        <div class="card-title">Sign-in Method</div>
        <canvas id="authChart"></canvas>
      </div>
    </div>

    <!-- Holdings -->
    <div class="two-col">
      <div class="card">
        <div class="card-title">Holdings by Metal</div>
        <table>
          <tr><th>Metal</th><th>Items</th><th>Users</th><th>Total (g)</th></tr>
          ${d.holdingsByMetal.map(m => `
            <tr>
              <td><span class="badge badge-${m.metal}">${m.metal}</span></td>
              <td>${m.items}</td>
              <td>${m.users}</td>
              <td>${m.total_grams}g</td>
            </tr>
          `).join('') || '<tr><td colspan="4" style="color:var(--muted);padding-top:12px">No holdings yet</td></tr>'}
        </table>
      </div>
      <div class="card">
        <div class="card-title">Holdings by Type</div>
        <table>
          <tr><th>Type</th><th>Items</th><th>Users</th></tr>
          ${d.holdingsByType.map(t => `
            <tr>
              <td><span class="badge badge-${t.type}">${t.type.replace('_',' ')}</span></td>
              <td>${t.items}</td>
              <td>${t.users}</td>
            </tr>
          `).join('') || '<tr><td colspan="3" style="color:var(--muted);padding-top:12px">No holdings yet</td></tr>'}
        </table>
      </div>
    </div>

    <!-- Auth breakdown -->
    <div class="card" style="margin-bottom:32px">
      <div class="card-title">Sign-in Method Breakdown</div>
      <table>
        <tr><th>Method</th><th>Users</th><th>Share</th></tr>
        ${d.authMethods.map(m => `
          <tr>
            <td><span class="badge badge-${m.method}">${m.method}</span></td>
            <td>${m.count}</td>
            <td>${d.totalUsers > 0 ? Math.round(m.count / d.totalUsers * 100) : 0}%</td>
          </tr>
        `).join('') || '<tr><td colspan="3" style="color:var(--muted)">No data</td></tr>'}
      </table>
    </div>
  `;

  // Signup chart
  const days = d.signupsByDay;
  if (days.length > 0) {
    const ctx = document.getElementById('signupChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: days.map(r => new Date(r.day).toLocaleDateString('en-IN',{month:'short',day:'numeric'})),
        datasets: [{
          data: days.map(r => parseInt(r.count)),
          backgroundColor: 'rgba(184,134,11,0.5)',
          borderColor: '#B8860B',
          borderWidth: 1,
          borderRadius: 4,
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { stepSize: 1, color: '#888' }, grid: { color: 'rgba(0,0,0,0.05)' } },
          x: { ticks: { color: '#888', maxRotation: 45 }, grid: { display: false } }
        }
      }
    });
  }

  // Auth pie chart
  const authCtx = document.getElementById('authChart').getContext('2d');
  new Chart(authCtx, {
    type: 'doughnut',
    data: {
      labels: d.authMethods.map(m => m.method),
      datasets: [{
        data: d.authMethods.map(m => parseInt(m.count)),
        backgroundColor: ['rgba(60,100,200,0.7)', 'rgba(200,60,60,0.7)', 'rgba(184,134,11,0.7)'],
        borderWidth: 0,
      }]
    },
    options: {
      plugins: {
        legend: { position: 'bottom', labels: { color: '#888', font: { size: 11 } } }
      },
      cutout: '65%',
    }
  });
}

loadStats();
</script>
</body>
</html>
